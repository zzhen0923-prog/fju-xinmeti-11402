<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠遊戲 - Whac-A-Mole</title>
    <style>
        :root {
            --hole-color: #d7ccc8;
            --mole-color: #ffccbc;
            --grass-color: #c8e6c9;
            --bg-color: #fce4ec;
            --accent-color: #ff80ab;
        }

        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body {
            font-family: 'Fredoka One', 'Segoe UI', cursive, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        /* 裝飾雲朵 */
        .cloud {
            position: absolute;
            background: white;
            width: 100px;
            height: 40px;
            border-radius: 50px;
            opacity: 0.7;
            z-index: -1;
            animation: float 20s linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud::after { width: 40px; height: 40px; top: -15px; left: 45px; }

        @keyframes float {
            from { left: -150px; }
            to { left: 110%; }
        }

        h1 {
            color: var(--accent-color);
            font-size: 3rem;
            text-shadow: 3px 3px white;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-board, .timer-board {
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 25px;
            border-radius: 30px;
            border: 4px solid var(--accent-color);
            color: #ad1457;
            font-size: 1.5rem;
            box-shadow: 0 5px 0 var(--accent-color);
        }

        .game {
            width: 600px;
            height: 450px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            background-color: var(--grass-color);
            padding: 30px;
            border-radius: 40px;
            border: 8px solid #a5d6a7;
            box-shadow: 0 15px 0 #81c784;
            position: relative;
        }

        /* 小花裝飾 */
        .flower {
            position: absolute;
            font-size: 20px;
            z-index: 5;
        }

        .hole {
            position: relative;
            overflow: hidden;
            background-color: #bcaaa4;
            border-radius: 50% 50% 20% 20%;
            border: 4px solid #8d6e63;
        }

        .hole.allow-fly { overflow: visible; z-index: 10; }

        .hole::after {
            content: '';
            display: block;
            background: #bcaaa4;
            width: 100%;
            height: 25px;
            position: absolute;
            bottom: -2px;
            left: 0;
            z-index: 2;
            border-radius: 0 0 20px 20px;
        }

        .mole {
            background-color: var(--mole-color);
            width: 80%;
            height: 100%;
            position: absolute;
            bottom: -100%;
            left: 10%;
            border-radius: 50% 50% 0 0;
            transition: bottom 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 可愛的大眼睛 */
        .mole::before, .mole::after {
            content: '';
            width: 14px;
            height: 14px;
            background: #424242;
            border-radius: 50%;
            position: absolute;
            top: 40px;
            /* 眼睛反光 */
            box-shadow: inset -2px -2px 0 white;
        }
        .mole::before { left: 25%; }
        .mole::after { right: 25%; }

        /* 腮紅 */
        .blush {
            position: absolute;
            width: 15px;
            height: 8px;
            background: #ffab91;
            border-radius: 50%;
            top: 55px;
            opacity: 0.6;
        }
        .blush.left { left: 15%; }
        .blush.right { right: 15%; }

        /* 頭頂小草 */
        .leaf {
            position: absolute;
            top: -10px;
            font-size: 24px;
            transform: rotate(-15deg);
        }

        /* 鼻子 */
        .mole-nose {
            width: 16px;
            height: 10px;
            background: #f48fb1;
            border-radius: 50%;
            margin-top: 55px;
        }

        /* 受傷眼淚 */
        .tear {
            position: absolute;
            width: 8px;
            height: 12px;
            background: #81d4fa;
            border-radius: 50% 50% 50% 50% / 20% 20% 80% 80%;
            top: 55px;
            display: none;
        }
        .tear.left { left: 25%; }

        /* 受傷狀態 */
        .mole.hurt {
            background-color: #ff8a80 !important;
        }
        .mole.hurt::before, .mole.hurt::after {
            content: '>';
            background: transparent;
            box-shadow: none;
            font-size: 20px;
            color: white;
            top: 35px;
        }
        .mole.hurt::after { content: '<'; }
        .mole.hurt .tear { display: block; }

        .mole.flying {
            animation: fly-away 0.8s ease-in forwards;
        }

        @keyframes fly-away {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(200px, -600px) rotate(1080deg) scale(0.5); opacity: 0; }
        }

        .hole.up .mole { bottom: 0; }

        .controls { margin-top: 40px; }

        button {
            padding: 15px 40px;
            font-size: 1.8rem;
            font-family: 'Fredoka One', cursive;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #ad1457;
            transition: all 0.1s;
        }

        button:hover { background-color: #ff4081; transform: translateY(-2px); }
        button:active { transform: translateY(6px); box-shadow: 0 2px 0 #ad1457; }
        button:disabled { background-color: #f48fb1; box-shadow: 0 4px 0 #c2185b; cursor: not-allowed; }

        .bonk { animation: shake 0.2s linear infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-2deg); }
            75% { transform: translateX(5px) rotate(2deg); }
        }

        @media (max-width: 650px) {
            .game { width: 90vw; height: 110vw; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- 雲朵背景 -->
    <div class="cloud" style="top: 10%; animation-delay: 0s;"></div>
    <div class="cloud" style="top: 25%; animation-delay: -5s;"></div>
    <div class="cloud" style="top: 15%; animation-delay: -12s;"></div>

    <h1>可愛地鼠拍拍 🌸</h1>

    <div class="stats">
        <div class="score-board">點數: <span id="score">0</span></div>
        <div class="timer-board">時間: <span id="timer">30</span>s</div>
    </div>

    <div class="game" id="game-board">
        <!-- 會由 JS 動態加入小花 -->
        <div class="hole"><div class="mole"><div class="leaf">🌿</div><div class="blush left"></div><div class="blush right"></div><div class="tear left"></div><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="leaf">🌿</div><div class="blush left"></div><div class="blush right"></div><div class="tear left"></div><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="leaf">🌿</div><div class="blush left"></div><div class="blush right"></div><div class="tear left"></div><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="leaf">🌿</div><div class="blush left"></div><div class="blush right"></div><div class="tear left"></div><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="leaf">🌿</div><div class="blush left"></div><div class="blush right"></div><div class="tear left"></div><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="leaf">🌿</div><div class="blush left"></div><div class="blush right"></div><div class="tear left"></div><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="leaf">🌿</div><div class="blush left"></div><div class="blush right"></div><div class="tear left"></div><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="leaf">🌿</div><div class="blush left"></div><div class="blush right"></div><div class="tear left"></div><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="leaf">🌿</div><div class="blush left"></div><div class="blush right"></div><div class="tear left"></div><div class="mole-nose"></div></div></div>
    </div>

    <div class="controls">
        <button id="start-btn" onclick="startGame()">💖 開始拍拍 💖</button>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole');
        const scoreBoard = document.querySelector('#score');
        const timerBoard = document.querySelector('#timer');
        const startBtn = document.querySelector('#start-btn');
        const moles = document.querySelectorAll('.mole');
        const gameBoard = document.querySelector('#game-board');

        let lastHole;
        let timeUp = false;
        let score = 0;
        let countdown;
        let timeLeft = 30;

        // 加入裝飾小花
        const flowers = ['🌸', '🌼', '🌷', '✨'];
        for (let i = 0; i < 8; i++) {
            const f = document.createElement('div');
            f.className = 'flower';
            f.textContent = flowers[Math.floor(Math.random() * flowers.length)];
            f.style.top = Math.random() * 90 + '%';
            f.style.left = Math.random() * 90 + '%';
            gameBoard.appendChild(f);
        }

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole(holes);
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(500, 1200);
            const hole = randomHole(holes);
            hole.classList.add('up');
            
            setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            scoreBoard.textContent = 0;
            timerBoard.textContent = 30;
            score = 0;
            timeLeft = 30;
            timeUp = false;
            startBtn.disabled = true;
            peep();
            
            countdown = setInterval(() => {
                timeLeft--;
                timerBoard.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timeUp = true;
                    startBtn.disabled = false;
                    alert('💖 拍拍結束！你得到了 ' + score + ' 個愛心點數 💖');
                }
            }, 1000);
        }

        function bonk(e) {
            if(!e.isTrusted) return;
            if(this.classList.contains('flying')) return;

            score += 10;
            scoreBoard.textContent = score;

            const mole = this;
            const hole = this.parentNode;

            mole.classList.add('hurt');
            mole.classList.add('bonk');

            setTimeout(() => {
                hole.classList.add('allow-fly');
                mole.classList.add('flying');
                mole.classList.remove('bonk');
            }, 100);

            setTimeout(() => {
                mole.classList.remove('flying');
                mole.classList.remove('hurt');
                hole.classList.remove('allow-fly');
                hole.classList.remove('up');
            }, 800);
        }

        moles.forEach(mole => mole.addEventListener('click', bonk));
    </script>
</body>
</html>
